<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSX Exam – Practice Test</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --blue: #388bfd;
    --blue-bg: #1c2d4b;
    --blue-border: #1f6feb;
    --green: #3fb950;
    --green-bg: #0f2d1a;
    --green-border: #238636;
    --red: #f85149;
    --red-bg: #2d1313;
    --red-border: #da3633;
    --yellow: #d29922;
    --yellow-bg: #2d2000;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  }
  .header-title { font-weight: 600; font-size: 15px; }
  .header-sub { font-size: 12px; color: var(--muted); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .timer {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
  }
  .timer.warning { color: var(--yellow); border-color: var(--yellow); }
  .timer.danger { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

  /* ── PROGRESS ── */
  .progress-wrap {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-text { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ── MAIN ── */
  .main { max-width: 800px; margin: 0 auto; padding: 28px 20px 60px; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 18px;
  }
  .q-num {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.55; white-space: pre-wrap; }
  .q-instruction {
    font-size: 12px;
    color: var(--yellow);
    background: var(--yellow-bg);
    border: 1px solid var(--yellow);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    margin-bottom: 16px;
    display: inline-block;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
  }
  .opt:hover:not(:disabled) { border-color: var(--blue-border); background: var(--blue-bg); }
  .opt.selected { border-color: var(--blue-border); background: var(--blue-bg); }
  .opt.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
  .opt.wrong   { border-color: var(--red-border);   background: var(--red-bg);   color: var(--red); }
  .opt.missed  { border-color: var(--green-border); background: var(--green-bg); color: var(--green); opacity: 0.7; }
  .opt:disabled { cursor: default; }

  .opt-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: background 0.15s, border-color 0.15s;
  }
  .opt-check.round { border-radius: 50%; }
  .opt.selected .opt-check { background: var(--blue); border-color: var(--blue); }
  .opt.correct .opt-check  { background: var(--green); border-color: var(--green); }
  .opt.wrong .opt-check    { background: var(--red); border-color: var(--red); }
  .opt.missed .opt-check   { background: var(--green); border-color: var(--green); opacity: 0.7; }

  .check-icon { width: 10px; height: 10px; fill: #fff; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok  { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
  .feedback.err { background: var(--red-bg);   border: 1px solid var(--red-border);   color: var(--red); }

  /* ── NAV ── */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .nav-info { font-size: 13px; color: var(--muted); }
  .btn-next {
    padding: 9px 22px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .btn-next:hover { background: #1a7fe8; }
  .btn-next.visible { display: block; }
  .btn-next.finish { background: var(--green); }
  .btn-next.finish:hover { background: #2ea043; }

  /* ── RESULTS ── */
  .results { display: none; }
  .results.show { display: block; }

  .result-hero {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .result-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .score-display {
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .score-display.pass { color: var(--green); }
  .score-display.fail { color: var(--red); }
  .score-label { font-size: 14px; color: var(--muted); margin-bottom: 22px; }
  .grade-badge {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .grade-badge.pass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .grade-badge.fail { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-val { font-size: 28px; font-weight: 600; margin-bottom: 3px; }
  .stat-lbl { font-size: 12px; color: var(--muted); }
  .stat-box.s-correct .stat-val { color: var(--green); }
  .stat-box.s-wrong .stat-val { color: var(--red); }
  .stat-box.s-pct .stat-val { color: var(--blue); }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .fail-card {
    background: var(--bg2);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .fail-q { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--text); white-space: pre-wrap; }
  .fail-row { font-size: 13px; display: flex; gap: 8px; margin-top: 5px; align-items: flex-start; }
  .fail-label {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; margin-top: 1px; flex-shrink: 0;
  }
  .fail-label.yours { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .fail-label.right { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .fail-answer { color: var(--muted); }
  .fail-answer.ok { color: var(--green); }
  .fail-num { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

  .btn-restart {
    padding: 10px 26px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-restart:hover { background: var(--bg3); }

  .restart-row { text-align: center; margin-top: 28px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  .btn-review {
    padding: 10px 26px;
    background: var(--blue);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-review:hover { background: #1a7fe8; }

  /* ── REVIEW MODE ── */
  .review-section { display: none; }
  .review-section.show { display: block; }
  .review-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .review-card.r-correct { border-color: var(--green-border); }
  .review-card.r-wrong   { border-color: var(--red-border); }
  .review-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
  }
  .review-badge.ok  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .review-badge.err { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* ── DRAG & DROP ── */
  .dd-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px; }
  .dd-col-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
  .dd-sources { display: flex; flex-direction: column; gap: 8px; }
  .dd-chip { padding: 9px 13px; background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: var(--radius-sm); font-size: 13px; color: var(--blue); cursor: grab; user-select: none; transition: opacity 0.15s; }
  .dd-chip:active { cursor: grabbing; }
  .dd-chip.dragging { opacity: 0.35; }
  .dd-chip.placed { opacity: 0.3; cursor: default; pointer-events: none; }
  .dd-chip.correct-chip { background: var(--green-bg); border-color: var(--green-border); color: var(--green); cursor: default; }
  .dd-chip.wrong-chip { background: var(--red-bg); border-color: var(--red-border); color: var(--red); cursor: default; }
  .dd-targets { display: flex; flex-direction: column; gap: 12px; }
  .dd-target-row { display: flex; flex-direction: column; gap: 5px; }
  .dd-drop { min-height: 40px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; padding: 4px 8px; transition: border-color 0.15s, background 0.15s; }
  .dd-drop.over { border-color: var(--blue); background: var(--blue-bg); }
  .dd-drop.correct-drop { border-color: var(--green-border); background: var(--green-bg); border-style: solid; }
  .dd-drop.wrong-drop { border-color: var(--red-border); background: var(--red-bg); border-style: solid; }
  .dd-drop .dd-chip { margin: 0; padding: 4px 10px; font-size: 12px; }
  .dd-purpose { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .dd-check-btn { margin-top: 14px; padding: 9px 20px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .dd-check-btn:hover { background: #1a7fe8; }
  .dd-check-btn:disabled { opacity: 0.4; cursor: default; }

  @media (max-width: 600px) {
    .dd-wrap { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px 12px 48px; }
    .header { padding: 12px 14px; }
    .score-display { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">N</div>
  <div>
    <div class="header-title">VMware NSX — Practice Exam</div>
    <div class="header-sub">VCP-NV / 2V0-41.24</div>
  </div>
  <div class="header-right">
    <div class="timer" id="timer">00:00</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 83</div>
</div>

<div class="main">

  <!-- EXAM SECTION -->
  <div id="examSection">
    <div class="q-card">
      <div class="q-header">
        <span class="q-num" id="qNum">Q1</span>
        <p class="q-text" id="qText"></p>
      </div>
      <div id="qInstruction"></div>
      <div class="options" id="optsList"></div>
      <div class="feedback" id="feedbackBox"></div>
    </div>
    <div class="nav">
      <span class="nav-info" id="navInfo"></span>
      <button class="btn-next" id="btnNext">Next →</button>
    </div>
  </div>

  <!-- RESULTS SECTION -->
  <div class="results" id="resultsSection">
    <div class="result-hero">
      <div class="result-title">Exam Complete</div>
      <div class="result-sub">VMware NSX Practice Test</div>
      <div class="score-display" id="scoreDisplay">0%</div>
      <div class="score-label" id="scoreLabel">0 correct of 83 questions</div>
      <span class="grade-badge" id="gradeBadge">—</span>
    </div>

    <div class="stats-grid">
      <div class="stat-box s-correct">
        <div class="stat-val" id="statCorrect">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-box s-wrong">
        <div class="stat-val" id="statWrong">0</div>
        <div class="stat-lbl">Incorrect</div>
      </div>
      <div class="stat-box s-pct">
        <div class="stat-val" id="statTime">0:00</div>
        <div class="stat-lbl">Time taken</div>
      </div>
    </div>

    <div id="failuresWrap"></div>

    <div class="restart-row">
      <button class="btn-restart" onclick="restart()">↺ Restart Exam</button>
      <button class="btn-review" onclick="showReview()">Review All Questions</button>
    </div>
  </div>

  <!-- REVIEW SECTION -->
  <div class="review-section" id="reviewSection">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
      <div style="font-size:16px; font-weight:600;">Full Review</div>
      <button class="btn-restart" onclick="backToResults()">← Back to results</button>
    </div>
    <div id="reviewContent"></div>
  </div>

</div>

<script>
const QUESTIONS = [{"q":"What is the VMware recommended way to deploy a virtual NSX Edge Node?","opts":["Through the NSX UI","Through automated or interactive mode using an ISO","Through the vSphere Web Client","Through the OVF command line tool"],"correct":[0]},{"q":"Which three selections are capabilities of Network Topology? (Choose three.)","opts":["Display how the different NSX components are interconnected.","Display the VMs connected to Segments.","Display how the Physical components are interconnected.","Display the uplinks configured on the Tier-1 Gateways.","Display the uplinks configured on the Tier-0 Gateways."],"correct":[0,1,4]},{"q":"An NSX administrator has deployed a single NSX Manager node and will be adding two additional nodes to form a 3-node NSX Management Cluster for a production environment. The administrator will deploy these two additional nodes and Cluster VIP using the NSX UI.\nWhat two are the prerequisites for this configuration? (Choose two.)","opts":["The cluster configuration must be completed using API.","All nodes must be in the same subnet.","All nodes must be in separate subnets.","A compute manager must be configured.","NSX Manager must reside on a Windows Server."],"correct":[1,3]},{"q":"Which two commands does an NSX administrator use to check the IP address of the VMkernel port for the Geneve protocol on the ESXi transport node? (Choose two.)","opts":["net-dvs","esxcfg-nics -l","esxcli network ip interface ipv4 get","esxcfg-vmknic -l","esxcli network nic list"],"correct":[2,3]},{"q":"Which two are supported by L2 VPN clients? (Choose two.)","opts":["NSX Autonomous Edge","NSX Edge","NSX for vSphere Edge","3rd party Hardware VPN Device"],"correct":[0,1]},{"q":"As part of an organization\u2019s IT security compliance requirement, NSX Manager must be configured for 2FA (two-factor authentication).\nWhat should an NSX administrator have ready before the integration can be configured?","opts":["Active Directory LDAP integration wit // Shuffle array (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build a shuffled exam: randomize question order AND option order
// Correct indices are remapped to match the new option positions
function buildExam() {
  // Shuffle regular questions + options
  const shuffledQs = shuffle(QUESTIONS).map(q => {
    const indexed = q.opts.map((text, i) => ({ text, origIdx: i }));
    const shuffledOpts = shuffle(indexed);
    const correctSet = new Set(q.correct);
    const newCorrect = shuffledOpts
      .map((opt, newIdx) => correctSet.has(opt.origIdx) ? newIdx : -1)
      .filter(i => i !== -1);
    return { q: q.q, opts: shuffledOpts.map(o => o.text), correct: newCorrect };
  });
  // Shuffle DD questions (also shuffle items order)
  const shuffledDD = shuffle(DD_QUESTIONS).map(q => ({
    type: 'dragdrop',
    q: q.q,
    items: shuffle(q.items)
  }));
  // Interleave all questions randomly
  return shuffle([...shuffledQs, ...shuffledDD]);
}

// Start timer
function startTimer() {
  timerInterval = setInterval(() => {
    elapsedSecs++;
    const m = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
    const s = String(elapsedSecs % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = m + ':' + s;
  }, 1000);
}

function renderMCQ(q) {
  const isMulti = q.correct.length > 1;
  const instrEl = document.getElementById('qInstruction');

    instrEl.innerHTML = '<span class="q-instruction">Select ' + q.correct.length + ' answers</span>';

    instrEl.innerHTML = '';
  }
  const list = document.getElementById('optsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';

    list.appendChild(btn);
  });
}

let ddState = {}; // { dropIdx: labelText or null }
let dragItem = null;

function renderDragDrop(q) {
  document.getElementById('qInstruction').innerHTML = '<span class="q-instruction">Drag each item to its matching purpose</span>';
  ddState = {};
  q.items.forEach((_, i) => ddState[i] = null);

  const list = document.getElementById('optsList');
  list.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'dd-wrap';

  // Left col: draggable chips
  const leftCol = document.createElement('div');
  leftCol.innerHTML = '<div class="dd-col-title">Recommendations</div>';
  const sources = document.createElement('div');
  sources.className = 'dd-sources';
  sources.id = 'ddSources';

  q.items.forEach((item, i) => {
    const chip = document.createElement('div');
    chip.className = 'dd-chip';
    chip.textContent = item.label;
    chip.dataset.label = item.label;
    chip.draggable = true;
    chip.id = 'chip_' + i;

    // Desktop drag
    chip.addEventListener('dragstart', e => {
      dragItem = chip;
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', item.label);
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

    // Touch drag
    chip.addEventListener('touchstart', touchStart, {passive:true});
    chip.addEventListener('touchmove', touchMove, {passive:false});
    chip.addEventListener('touchend', touchEnd);

    sources.appendChild(chip);
  });

  leftCol.appendChild(sources);

  // Right col: drop zones
  const rightCol = document.createElement('div');
  rightCol.innerHTML = '<div class="dd-col-title">Purposes</div>';
  const targets = document.createElement('div');
  targets.className = 'dd-targets';

  q.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'dd-target-row';

    const drop = document.createElement('div');
    drop.className = 'dd-drop';
    drop.dataset.idx = i;
    drop.id = 'drop_' + i;

    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('over');
      const label = e.dataTransfer.getData('text/plain');
      placeChip(label, i);
    });

    const purpose = document.createElement('div');
    purpose.className = 'dd-purpose';
    purpose.textContent = item.purpose;

    row.appendChild(drop);
    row.appendChild(purpose);
    targets.appendChild(row);
  });

  rightCol.appendChild(targets);
  wrap.appendChild(leftCol);
  wrap.appendChild(rightCol);
  list.appendChild(wrap);

  // Check button
  const checkBtn = document.createElement('button');
  checkBtn.className = 'dd-check-btn';
  checkBtn.id = 'ddCheckBtn';
  checkBtn.textContent = 'Check Answers';
  checkBtn.disabled = true;
  checkBtn.onclick = () => confirmDragDrop(q);
  list.appendChild(checkBtn);
}

function placeChip(label, dropIdx) {
  const q = EXAM[current];
  // If drop already has a chip, return it to source
  if (ddState[dropIdx] !== null) {
    returnChipToSource(ddState[dropIdx]);
  }
  // If chip was in another drop, clear that drop
  Object.keys(ddState).forEach(k => {
    if (ddState[k] === label && parseInt(k) !== dropIdx) {
      ddState[k] = null;
      document.getElementById('drop_' + k).innerHTML = '';
    }
  });

  ddState[dropIdx] = label;

  const drop = document.getElementById('drop_' + dropIdx);
  drop.innerHTML = '';
  const mini = document.createElement('div');
  mini.className = 'dd-chip';
  mini.textContent = label;
  mini.dataset.label = label;
  mini.style.cursor = 'pointer';
  mini.title = 'Click to remove';
  mini.onclick = () => { returnChipToSource(label); ddState[dropIdx] = null; drop.innerHTML = ''; updateDDCheck(); };
  drop.appendChild(mini);

  // Mark source as placed
  const sourceChip = document.querySelector('#ddSources .dd-chip[data-label="' + CSS.escape(label) + '"]');
  if (sourceChip) sourceChip.classList.add('placed');

  updateDDCheck();
}

function returnChipToSource(label) {
  const sourceChip = document.querySelector('#ddSources .dd-chip[data-label="' + CSS.escape(label) + '"]');
  if (sourceChip) sourceChip.classList.remove('placed');
}

function updateDDCheck() {
  const allPlaced = Object.values(ddState).every(v => v !== null);
  const btn = document.getElementById('ddCheckBtn');
  if (btn) btn.disabled = !allPlaced;
}

function confirmDragDrop(q) {
  answered = true;
  let correct = true;
  q.items.forEach((item, i) => {
    const drop = document.getElementById('drop_' + i);
    const placed = ddState[i];
    const isRight = placed === item.label;
    if (!isRight) correct = false;
    drop.classList.add(isRight ? 'correct-drop' : 'wrong-drop');
    if (drop.firstChild) drop.firstChild.classList.add(isRight ? 'correct-chip' : 'wrong-chip');
  });

  document.getElementById('ddCheckBtn').disabled = true;
  // Disable source chips
  document.querySelectorAll('#ddSources .dd-chip').forEach(c => { c.draggable = false; c.style.pointerEvents = 'none'; });

  if (correct) {
    score++;
    const fb = document.getElementById('feedbackBox');
    fb.className = 'feedback ok show';
    fb.innerHTML = '✓ Correct! All items matched correctly.';
  } else {
    const fb = document.getElementById('feedbackBox');
    const correctMap = q.items.map(it => it.label + ' → ' + it.purpose.substring(0, 40) + '...').join('<br>');
    fb.className = 'feedback err show';
    fb.innerHTML = '✗ Incorrect. Correct matches:<br>' + correctMap;
    failures.push({ idx: current, selected: [], isDragDrop: true, ddState: {...ddState}, q });
  }

  userAnswers[current] = { selected: [], correct, isDragDrop: true, ddState: {...ddState}, qItems: q.items };
  document.getElementById('btnNext').classList.add('visible');
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + TOTAL;
  document.getElementById('progressFill').style.width = (((current + 1) / TOTAL) * 100) + '%';
}

// ── TOUCH DRAG ──
let touchClone = null;
let touchSourceChip = null;

function touchStart(e) {
  touchSourceChip = e.currentTarget;
  const rect = touchSourceChip.getBoundingClientRect();
  touchClone = touchSourceChip.cloneNode(true);
  touchClone.style.cssText = 'position:fixed;pointer-events:none;opacity:0.8;z-index:9999;width:' + rect.width + 'px;';
  touchClone.style.left = rect.left + 'px';
  touchClone.style.top = rect.top + 'px';
  document.body.appendChild(touchClone);
}

function touchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - 60) + 'px';
  touchClone.style.top  = (t.clientY - 20) + 'px';
  document.querySelectorAll('.dd-drop').forEach(d => d.classList.remove('over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const drop = el ? el.closest('.dd-drop') : null;
  if (drop) drop.classList.add('over');
}

function touchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.dd-drop').forEach(d => d.classList.remove('over'));
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const drop = el ? el.closest('.dd-drop') : null;
  if (drop && touchSourceChip) {
    placeChip(touchSourceChip.dataset.label, parseInt(drop.dataset.idx));
  }
  touchSourceChip = null;
}

function toggleOption(idx) {
  if (answered) return;
  const q = EXAM[current];
  if (q.type === 'dragdrop') return;
  const isMulti = q.correct.length > 1;
  const btns = document.querySelectorAll('.opt');

  if (!isMulti) {
    // single select — confirm immediately
    selected = [idx];
    confirmAnswer();
    return;
  }

  // multi select — toggle
  const pos = selected.indexOf(idx);
  if (pos === -1) {
    if (selected.length < q.correct.length) {
      selected.push(idx);
      btns[idx].classList.add('selected');
      document.getElementById('chk' + idx).innerHTML = CHECK_SVG;
    }
  } else {
    selected.splice(pos, 1);
    btns[idx].classList.remove('selected');
    document.getElementById('chk' + idx).innerHTML = '';
  }

  const navInfo = document.getElementById('navInfo');
  navInfo.textContent = selected.length + ' / ' + q.correct.length + ' selected';

  if (selected.length === q.correct.length) {
    confirmAnswer();
  }
}

function confirmAnswer() {
  if (answered) return;
  answered = true;

  const q = EXAM[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);

  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  const isCorrect = q.correct.length === selected.length && q.correct.every(c => selectedSet.has(c));

  // Color options
  btns.forEach((btn, i) => {
    const chk = document.getElementById('chk' + i);
    if (selectedSet.has(i) && correctSet.has(i)) {
      btn.classList.add('correct');
      chk.innerHTML = CHECK_SVG;
    } else if (selectedSet.has(i) && !correctSet.has(i)) {
      btn.classList.add('wrong');
      chk.innerHTML = X_SVG;
    } else if (!selectedSet.has(i) && correctSet.has(i)) {
      btn.classList.add('missed');
      chk.innerHTML = CHECK_SVG;
    }
  });

  const fb = document.getElementById('feedbackBox');
  if (isCorrect) {
    score++;
    fb.className = 'feedback ok show';
    fb.innerHTML = '✓ Correct!';
  } else {
    const correctLabels = q.correct.map(c => q.opts[c]).join(', ');
    fb.className = 'feedback err show';
    fb.innerHTML = '✗ Incorrect. Correct answer' + (q.correct.length > 1 ? 's' : '') + ': <strong>' + correctLabels + '</strong>';
    failures.push({ idx: current, selected: [...selected] });
  }

  userAnswers[current] = { selected: [...selected], correct: isCorrect };
  document.getElementById('navInfo').textContent = '';
  document.getElementById('btnNext').classList.add('visible');
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + TOTAL;
  document.getElementById('progressFill').style.width = (((current + 1) / TOTAL) * 100) + '%';
}

document.getElementById('btnNext').addEventListener('click', () => {
  current++;
  if (current >= TOTAL) showResults();
  else render();
});

function showResults() {
  clearInterval(timerInterval);
  document.getElementById('examSection').style.display = 'none';
  document.getElementById('resultsSection').className = 'results show';

  const pct = Math.round((score / TOTAL) * 100);
  const pass = pct >= 70;

  document.getElementById('scoreDisplay').textContent = pct + '%';
  document.getElementById('scoreDisplay').className = 'score-display ' + (pass ? 'pass' : 'fail');
  document.getElementById('scoreLabel').textContent = score + ' correct of ' + TOTAL + ' questions';

  const badge = document.getElementById('gradeBadge');
  badge.textContent = pass ? '✓ PASS' : '✗ NEEDS IMPROVEMENT';
  badge.className = 'grade-badge ' + (pass ? 'pass' : 'fail');

  document.getElementById('statCorrect').textContent = score;
  document.getElementById('statWrong').textContent = TOTAL - score;
  const m = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
  const s = String(elapsedSecs % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + s;

  // Build failures section
  const wrap = document.getElementById('failuresWrap');
  if (failures.length === 0) {
    wrap.innerHTML = '<div style="text-align:center; padding:20px; color:var(--green)">🎉 Perfect score! No failures.</div>';
  } else {
    let html = '<div class="section-title" style="margin-top:8px">Incorrect Answers (' + failures.length + ')</div>';
    failures.forEach((f, fi) => {
      const q = EXAM[f.idx];
      let yourAns, rightAns;
      if (f.isDragDrop) {
        const items = f.q ? f.q.items : q.items;
        yourAns = Object.entries(f.ddState).map(([i, lbl]) => (lbl || '(empty)') + ' → ' + (items[i] ? items[i].purpose.substring(0,40)+'...' : '')).join('<br>');
        rightAns = items.map(it => it.label + ' → ' + it.purpose.substring(0,40)+'...').join('<br>');
      } else {
        yourAns = f.selected.map(i => q.opts[i]).join(', ') || '(none)';
        rightAns = q.correct.map(i => q.opts[i]).join(', ');
      }
      html += `<div class="fail-card">
        <div class="fail-num">Question ${f.idx + 1}</div>
        <div class="fail-q">${q.q}</div>
        <div class="fail-row"><span class="fail-label yours">Your answer</span><span class="fail-answer">${yourAns}</span></div>
        <div class="fail-row"><span class="fail-label right">Correct</span><span class="fail-answer ok">${rightAns}</span></div>
      </div>`;
    });
    wrap.innerHTML = html;
  }
}

function showReview() {
  document.getElementById('resultsSection').className = 'results';
  document.getElementById('reviewSection').className = 'review-section show';

  let html = '';
  EXAM.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua && ua.correct;
    let optsHtml = '';

    if (q.type === 'dragdrop') {
      const items = ua ? ua.qItems : q.items;
      items.forEach((item, j) => {
        const placed = ua ? ua.ddState[j] : null;
        const right = placed === item.label;
        const cls = !ua ? '' : (right ? 'correct' : 'wrong');
        const icon = right ? CHECK_SVG : (ua ? X_SVG : '');
        optsHtml += `<div class="opt ${cls}" style="cursor:default;margin-bottom:7px"><span class="opt-check round">${icon}</span><span><strong>${placed || '(not placed)'}</strong> → ${item.purpose.substring(0,60)}...</span></div>`;
      });
    } else {
      const correctSet = new Set(q.correct);
      const selectedSet = ua ? new Set(ua.selected) : new Set();
      q.opts.forEach((opt, j) => {
        let cls = '';
        if (selectedSet.has(j) && correctSet.has(j)) cls = 'correct';
        else if (selectedSet.has(j) && !correctSet.has(j)) cls = 'wrong';
        else if (!selectedSet.has(j) && correctSet.has(j)) cls = 'missed';
        const icon = cls === 'correct' || cls === 'missed' ? CHECK_SVG : (cls === 'wrong' ? X_SVG : '');
        const chkCls = q.correct.length > 1 ? 'opt-check' : 'opt-check round';
        optsHtml += `<div class="opt ${cls}" style="cursor:default;margin-bottom:7px"><span class="${chkCls}">${icon}</span><span>${opt}</span></div>`;
      });
    }

    html += `<div class="review-card ${isCorrect ? 'r-correct' : 'r-wrong'}">
      <span class="review-badge ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</span>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Q${i+1}${q.type === 'dragdrop' ? ' · Drag & Drop' : ''}</div>
      <div style="font-weight:500;margin-bottom:14px;white-space:pre-wrap">${q.q}</div>
      ${optsHtml}
    </div>`;
  });

  document.getElementById('reviewContent').innerHTML = html;
  window.scrollTo(0, 0);
}

function backToResults() {
  document.getElementById('reviewSection').className = 'review-section';
  document.getElementById('resultsSection').className = 'results show';
  window.scrollTo(0, 0);
}

function restart() {
  current = 0;
  score = 0;
  answered = false;
  selected = [];
  failures = [];
  userAnswers = [];
  elapsedSecs = 0;
  EXAM = buildExam();
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('resultsSection').className = 'results';
  document.getElementById('reviewSection').className = 'review-section';
  document.getElementById('examSection').style.display = 'block';
  startTimer();
  render();
  window.scrollTo(0, 0);
}

EXAM = buildExam();
startTimer();
render();
</script>
</body>
